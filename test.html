<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Highcharts Comprehensive Test</title>
  <link rel="stylesheet" href="/node_modules/@highcharts/dashboards/css/dashboards.css">
  <link rel="stylesheet" href="/node_modules/@highcharts/grid-lite/css/grid-lite.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 16px; height: 100%; font-family: system-ui; background: #1e1e1e; color: #fff; }
    h1 { margin: 0 0 8px; font-size: 20px; }
    h2 { margin: 24px 0 8px; font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    .test { margin-bottom: 16px; border: 1px solid #333; border-radius: 8px; overflow: hidden; }
    .test-header { padding: 6px 12px; background: #2a2a2a; font-size: 12px; font-weight: 600; display: flex; justify-content: space-between; }
    .test-header .status { font-weight: normal; }
    .test-header .status.pass { color: #4caf50; }
    .test-header .status.fail { color: #f44336; }
    .test-container { min-height: 280px; background: #fff; }
    .dashboard-container { min-height: 450px; background: #fff; }
    button { margin: 2px; padding: 6px 12px; border: 1px solid #555; border-radius: 4px; background: #333; color: #fff; cursor: pointer; font-size: 12px; }
    button:hover { background: #444; }
    button.active { background: #0066cc; border-color: #0088ff; }
    #controls { margin-bottom: 12px; display: flex; flex-wrap: wrap; gap: 4px; }
    pre#log { background: #111; padding: 8px; border-radius: 4px; overflow: auto; font-size: 11px; color: #aaa; max-height: 300px; margin-top: 16px; }
    .summary { padding: 12px; background: #222; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
    .summary .pass { color: #4caf50; font-weight: bold; }
    .summary .fail { color: #f44336; font-weight: bold; }
    .section-label { font-size: 11px; color: #666; margin-right: 8px; }

    /* Light mode */
    body.light { background: #f5f5f5; color: #333; }
    body.light .test { border-color: #ddd; }
    body.light .test-header { background: #e8e8e8; }
    body.light #controls button { background: #ddd; color: #333; border-color: #bbb; }
    body.light #controls button.active { background: #0066cc; color: #fff; }
    body.light pre#log { background: #fff; color: #333; }
    body.light .summary { background: #e0e0e0; }
  </style>
</head>
<body>
  <h1>🔬 Highcharts MCP Comprehensive Test</h1>
  <div class="summary" id="summary">Ready to test</div>
  <div id="controls">
    <span class="section-label">Tools:</span>
    <button onclick="runCategory('chart')">Charts</button>
    <button onclick="runCategory('stock')">Stock</button>
    <button onclick="runCategory('map')">Map</button>
    <button onclick="runCategory('gantt')">Gantt</button>
    <button onclick="runCategory('grid')">Grid</button>
    <button onclick="runCategory('dashboard')">Dashboard</button>
    <span class="section-label" style="margin-left: 12px;">All:</span>
    <button onclick="runCategory('all')" class="active">Run All</button>
    <span class="section-label" style="margin-left: 12px;">Theme:</span>
    <button onclick="toggleTheme()">Toggle Light/Dark</button>
  </div>
  <div id="results"></div>
  <pre id="log"></pre>

  <script type="module" src="/test-runner.js"></script>
</body>
</html>
